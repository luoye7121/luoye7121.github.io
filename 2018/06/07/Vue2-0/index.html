        <p>###动画<br><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">###需要下载animated.css文件并引入</span><br><span class="line">###命令 $brower install animated.css(备注：brower为纯前端的下载资源的管理工具)</span><br><span class="line">&lt;transition enter-active-class=&quot;animated zoomInLeft&quot; leave-active-class=&apos;animated zoomOutRight&apos; &gt;</span><br><span class="line">&lt;p v-bind:key=&quot;&quot;&gt;&lt;/p&gt;</span><br><span class="line">&lt;p v-bind:key=&quot;&quot;&gt;&lt;/p&gt;&lt;!--备注：多个元素运动是必须添加key,单个元素运动不需要绑定key 且注意；运动的元素必须包含在transition标签中--&gt;</span><br><span class="line">&lt;/transition&gt;</span><br></pre></td></tr></table></figure></p>
<p>###路由实例方法<br><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br></pre></td><td class="code"><pre><span class="line">router.push(&#123;path:&apos;home&apos;&#125;)//直接添加一个路由，表现是切换路由，本质是往历史记录里添加一个记录</span><br><span class="line">router.replace&#123;&#123;path:&apos;news&apos;&#125;&#125;//直接添加一个路由，表现是切换路由，本质是历史记录里并无该记录</span><br><span class="line"></span><br><span class="line">main.js文件中</span><br><span class="line">import Vue from &apos;./vue&apos;;</span><br><span class="line">import VueRouter from &apos;./vue-router&apos;</span><br><span class="line">import RouterConfig from &apos;./router.config.js&apos;</span><br><span class="line">import App from &apos;./App.vue&apos;</span><br><span class="line"></span><br><span class="line">const router=new VueRouter(RouterConfig)</span><br><span class="line">new Vue(&#123;</span><br><span class="line">router,</span><br><span class="line">el:&apos;#app&apos;,</span><br><span class="line">render:h=&gt;h(App)</span><br><span class="line">&#125;);</span><br><span class="line">新建router.config.js文件</span><br><span class="line">import Home from &apos;./components/Home.vue&apos;</span><br><span class="line">import News from &apos;./components/News.vue&apos;</span><br><span class="line">export default&#123;</span><br><span class="line">    routes:[</span><br><span class="line">        &#123;path:&apos;/home&apos;,component:Home&#125;,</span><br><span class="line">        &#123;path:&apos;/news&apos;,component:News&#125;,</span><br><span class="line">        &#123;path:&apos;*&apos;,redirect:&apos;/home&apos;&#125;//路由重定向</span><br><span class="line">    ]</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure></p>
